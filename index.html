    <td>${rodzajBadge(b.bond_rodzaj)}</td>
    <td style="max-width:220px"><div style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHTML(b.bond_kontrakt)}</div><div style="font-size:var(--text-xs);color:var(--color-primary)">${escapeHTML(b.bond_beneficjent||'')}</div></td>
    <td style="font-size:var(--text-xs);white-space:nowrap">${b.bond_data_od}<br>${b.bond_data_do}</td>
    <td class="num">${fmt(b.bond_suma)}</td>
    <td class="num">${fmt(b.bond_skladka)}</td>
    <td>${statusBadge(b)}</td>
  </tr>`).join(''):'<tr><td colspan="7"><div class="empty"><p>Brak gwarancji</p></div></td></tr>';
  navTo('insurer-detail');
}

// ── loadTuDict on init ──
(async()=>{await loadTuDict();})();

</script>
</body>
</html>
